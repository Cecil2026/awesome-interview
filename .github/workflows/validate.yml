name: Validate question bank

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "tools/_md.py"
      - "tools/validate.py"
      - "tools/build_index.py"
      - ".github/workflows/validate.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "tools/_md.py"
      - "tools/validate.py"
      - "tools/build_index.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Fails on schema ERRORs: missing Tags, missing complexity note on
      # company algorithm questions, EN/ZH count mismatch, numbering gaps, or a
      # stale index. Use --strict locally to also fail on warnings.
      - name: Validate entry schema
        run: python tools/validate.py
