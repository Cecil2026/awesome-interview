name: Build questions.json

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "tools/build_index.py"
      - ".github/workflows/build-questions-json.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "tools/build_index.py"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a real commit identity for the auto-commit step below.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild docs/questions.json
        run: python tools/build_index.py

      - name: Fail the PR if the index is out of date
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet docs/questions.json; then
            echo "::error::docs/questions.json is out of date. Run 'python tools/build_index.py' locally and commit the result."
            git diff docs/questions.json
            exit 1
          fi

      - name: Commit refreshed index
        if: github.event_name == 'push'
        run: |
          if git diff --quiet docs/questions.json; then
            echo "Index unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/questions.json
          git commit -m "chore(docs): rebuild questions.json"
          git push
